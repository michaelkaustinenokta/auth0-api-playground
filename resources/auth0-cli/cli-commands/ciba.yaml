resourceServers:
  - name: API 1
    identifier: https://api1.com/endpoint
    allow_offline_access: true
    authorization_details:
      - type: money_transfer
    enforce_policies: true
    scopes:
      - value: read:messages
        description: Read all messages
      - value: adminread:messages
        description: Admin access, gives read access to all messages
    signing_alg: RS256
    skip_consent_for_verifiable_first_party_clients: true
    subject_type_authorization:
      user:
        policy: allow_all
      client:
        policy: require_client_grant
    token_dialect: access_token_authz
    token_lifetime: 86400
    token_lifetime_for_web: 7200
emailTemplates:
  - template: async_approval
    body: ./emailTemplates/async_approval.html
    enabled: true
    from: ''
    subject: CIBA Request
    syntax: liquid
clients:
  - name: AI Agent Demo
    allowed_clients: []
    app_type: regular_web
    async_approval_notification_channels:
      - guardian-push
      - email
    callbacks: []
    client_aliases: []
    cross_origin_authentication: false
    custom_login_page_on: true
    oidc_conformant: true
    grant_types:
      - authorization_code
      - implicit
      - refresh_token
      - client_credentials
      - urn:openid:params:grant-type:ciba
      - >-
        urn:auth0:params:oauth:grant-type:token-exchange:federated-connection-access-token